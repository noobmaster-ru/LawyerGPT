services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lawyergpt-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./database/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  postgres:
    image: postgres:15
    container_name: lawyergpt-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-legal_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ./database/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_user} -d ${POSTGRES_DB:-legal_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: lawyergpt-app
    ports:
      - "8501:8501"
    environment:
      X5_API_BASE_URL: ${X5_API_BASE_URL}
      X5_API_KEY: ${X5_API_KEY}
      X5_MODEL: ${X5_MODEL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-legal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-legal_db}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  hf_cache:
